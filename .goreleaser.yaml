# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
    # package the question bank (data/questions) into a fixed-name archive so
    # the CLI's first-run download can find it as a release asset. Staged
    # outside dist/, since goreleaser expects to own that directory's
    # lifecycle exclusively. tags.json is pdfparse's sidecar tag file, kept
    # out of data/questions (scraper-owned) but bundled alongside it here so
    # it lands in dataDir/questions next to the exam files core.LoadBank
    # expects it beside (see core.tagsFileName).
    - sh -c "mkdir -p .data-archive && cp pdfparse/tags.json data/questions/tags.json && tar czf .data-archive/data.tar.gz -C data/questions . && rm data/questions/tags.json"

builds:
  - main: ./...
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - arm64
      - amd64
      - "386"

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  extra_files:
    - glob: ./.data-archive/data.tar.gz
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
